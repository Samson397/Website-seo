<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" fill="none" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#122033" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0A1422" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0E8F86"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Atmosphere -->
  <ellipse cx="640" cy="280" rx="340" ry="260" fill="#0E8F86" opacity="0.14" filter="url(#soft)"/>
  <ellipse cx="780" cy="520" rx="220" ry="160" fill="#38BDF8" opacity="0.08" filter="url(#soft)"/>

  <!-- Main report panel -->
  <rect x="280" y="80" width="560" height="560" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="312" y="112" width="180" height="14" rx="7" fill="#ffffff" fill-opacity="0.18"/>
  <rect x="312" y="140" width="120" height="10" rx="5" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Score ring -->
  <circle cx="720" cy="190" r="58" stroke="#ffffff" stroke-opacity="0.08" stroke-width="12"/>
  <circle cx="720" cy="190" r="58" stroke="url(#ring)" stroke-width="12" stroke-linecap="round"
          stroke-dasharray="280" stroke-dashoffset="70" transform="rotate(-90 720 190)"/>
  <text x="720" y="198" text-anchor="middle" fill="#F8FAFC" font-family="Georgia, serif" font-size="34" font-weight="600">78</text>

  <!-- Check rows -->
  <g opacity="0.95">
    <rect x="312" y="230" width="496" height="52" rx="14" fill="#ffffff" fill-opacity="0.04"/>
    <circle cx="340" cy="256" r="8" fill="#2DD4BF"/>
    <rect x="364" y="246" width="200" height="10" rx="5" fill="#ffffff" fill-opacity="0.22"/>
    <rect x="364" y="264" width="140" height="8" rx="4" fill="#ffffff" fill-opacity="0.1"/>
    <rect x="720" y="248" width="64" height="16" rx="8" fill="#0E8F86" fill-opacity="0.35"/>

    <rect x="312" y="298" width="496" height="52" rx="14" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="340" cy="324" r="8" fill="#F59E0B"/>
    <rect x="364" y="314" width="220" height="10" rx="5" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="364" y="332" width="160" height="8" rx="4" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="720" y="316" width="64" height="16" rx="8" fill="#F59E0B" fill-opacity="0.28"/>

    <rect x="312" y="366" width="496" height="52" rx="14" fill="#ffffff" fill-opacity="0.04"/>
    <circle cx="340" cy="392" r="8" fill="#FB7185"/>
    <rect x="364" y="382" width="190" height="10" rx="5" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="364" y="400" width="170" height="8" rx="4" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="720" y="384" width="64" height="16" rx="8" fill="#FB7185" fill-opacity="0.28"/>

    <rect x="312" y="434" width="496" height="52" rx="14" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="340" cy="460" r="8" fill="#2DD4BF"/>
    <rect x="364" y="450" width="210" height="10" rx="5" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="364" y="468" width="130" height="8" rx="4" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="720" y="452" width="64" height="16" rx="8" fill="#0E8F86" fill-opacity="0.35"/>

    <rect x="312" y="502" width="496" height="52" rx="14" fill="#ffffff" fill-opacity="0.04"/>
    <circle cx="340" cy="528" r="8" fill="#38BDF8"/>
    <rect x="364" y="518" width="175" height="10" rx="5" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="364" y="536" width="150" height="8" rx="4" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="720" y="520" width="64" height="16" rx="8" fill="#38BDF8" fill-opacity="0.28"/>
  </g>

  <!-- Floating secondary panel -->
  <rect x="120" y="360" width="220" height="180" rx="22" fill="#0F1C2E" fill-opacity="0.92" stroke="#ffffff" stroke-opacity="0.1"/>
  <rect x="144" y="388" width="110" height="10" rx="5" fill="#ffffff" fill-opacity="0.18"/>
  <rect x="144" y="420" width="172" height="8" rx="4" fill="#2DD4BF" fill-opacity="0.55"/>
  <rect x="144" y="444" width="148" height="8" rx="4" fill="#ffffff" fill-opacity="0.12"/>
  <rect x="144" y="468" width="160" height="8" rx="4" fill="#ffffff" fill-opacity="0.12"/>
  <rect x="144" y="492" width="120" height="8" rx="4" fill="#ffffff" fill-opacity="0.12"/>
</svg>
